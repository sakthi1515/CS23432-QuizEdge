{% extends "base.html" %}
{% block title %}Quiz · Quiz Generator{% endblock %}
{% block content %}

<div class="quiz-layout" id="quiz-layout" style="display:none">
  <!-- Sidebar -->
  <div class="quiz-sidebar">
    <div class="timer-card">
      <div class="timer-label">⏱ Time Left</div>
      <div class="timer-display" id="timer-display">--:--</div>
      <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar"></div></div>
    </div>

    <div class="progress-card">
      <div class="progress-label">Progress</div>
      <div class="progress-nums"><span id="current-q">0</span> / <span id="total-q">0</span></div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
    </div>

    <div class="question-nav" id="question-nav"></div>

    <button class="btn-danger full-width" onclick="confirmSubmit()">Submit Quiz</button>
  </div>

  <!-- Main -->
  <div class="quiz-main">
    <div class="quiz-header">
      <h2 class="quiz-title-display" id="quiz-title-display"></h2>
      <div class="quiz-meta-row">
        <span id="quiz-q-count"></span>
        <span class="meta-sep">·</span>
        <span id="quiz-timer-info"></span>
      </div>
    </div>

    <div class="question-card" id="question-card">
      <div class="q-number" id="q-number">Question 1</div>
      <div class="q-text-display" id="q-text-display"></div>
      <div class="options-list-quiz" id="options-list"></div>
    </div>

    <div class="quiz-nav-buttons">
      <button class="btn-secondary" id="btn-prev" onclick="navigate(-1)">← Previous</button>
      <button class="btn-primary" id="btn-next" onclick="navigate(1)">Next →</button>
    </div>
  </div>
</div>

<!-- Loading state -->
<div class="loading-page" id="loading-page">
  <div class="loader loader-lg"></div>
  <p>Preparing your quiz…</p>
</div>

<!-- Confirm submit modal -->
<div class="modal-overlay" id="submit-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Submit Quiz?</h3>
      <button class="modal-close" onclick="document.getElementById('submit-modal').classList.remove('active')">✕</button>
    </div>
    <div id="submit-modal-body"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="document.getElementById('submit-modal').classList.remove('active')">Continue Quiz</button>
      <button class="btn-danger" onclick="submitQuiz()">Submit Now</button>
    </div>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
const QUIZ_ID = '{{ quiz_id }}';
let questions = [];
let answers = [];
let currentIdx = 0;
let timerInterval = null;
let secondsLeft = 0;
let totalSeconds = 0;
let quizStarted = false;

async function startQuiz() {
  const res = await fetch(`/api/quiz/${QUIZ_ID}/start`, {method: 'POST'});
  const data = await res.json();

  if (!res.ok) {
    if (data.already_attempted) {
      document.getElementById('loading-page').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔒</div>
          <p>You've already attempted this quiz.</p>
          <a href="/quiz/${QUIZ_ID}/result" class="btn-primary" style="margin-top:1rem">View My Result</a>
          <a href="/dashboard" class="btn-secondary" style="margin-top:.5rem">Back to Dashboard</a>
        </div>`;
      return;
    }
    document.getElementById('loading-page').innerHTML = `<p class="error">${data.error}</p>`;
    return;
  }

  questions = data.questions;
  answers = new Array(questions.length).fill(-1);
  totalSeconds = data.timer * 60;
  secondsLeft = totalSeconds;

  document.getElementById('quiz-title-display').textContent = data.title;
  document.getElementById('quiz-q-count').textContent = `${questions.length} Questions`;
  document.getElementById('quiz-timer-info').textContent = `${data.timer} Minutes`;
  document.getElementById('total-q').textContent = questions.length;

  buildNavDots();
  renderQuestion(0);
  startTimer();

  document.getElementById('loading-page').style.display = 'none';
  document.getElementById('quiz-layout').style.display = 'grid';
  quizStarted = true;
}

function buildNavDots() {
  const nav = document.getElementById('question-nav');
  nav.innerHTML = questions.map((_, i) => `
    <button class="nav-dot" id="dot-${i}" onclick="goTo(${i})">${i+1}</button>
  `).join('');
}

function renderQuestion(idx) {
  currentIdx = idx;
  const q = questions[idx];
  document.getElementById('q-number').textContent = `Question ${idx + 1} of ${questions.length}`;
  document.getElementById('q-text-display').textContent = q.text;
  document.getElementById('current-q').textContent = idx + 1;

  const progress = ((idx + 1) / questions.length) * 100;
  document.getElementById('progress-fill').style.width = progress + '%';

  const optList = document.getElementById('options-list');
  optList.innerHTML = q.options.map((opt, oi) => `
    <button class="option-btn ${answers[idx] === oi ? 'selected' : ''}" onclick="selectOption(${oi})">
      <span class="opt-letter">${String.fromCharCode(65+oi)}</span>
      <span class="opt-text">${opt}</span>
      ${answers[idx] === oi ? '<span class="opt-check">✓</span>' : ''}
    </button>
  `).join('');

  // Update nav dots
  document.querySelectorAll('.nav-dot').forEach((dot, i) => {
    dot.className = 'nav-dot';
    if (i === idx) dot.classList.add('active');
    else if (answers[i] !== -1) dot.classList.add('answered');
  });

  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').textContent = idx === questions.length - 1 ? '✓ Review & Submit' : 'Next →';
  document.getElementById('btn-next').onclick = idx === questions.length - 1 ? confirmSubmit : () => navigate(1);

  // Animate
  const card = document.getElementById('question-card');
  card.style.opacity = '0';
  card.style.transform = 'translateY(12px)';
  requestAnimationFrame(() => {
    card.style.transition = 'all .25s ease';
    card.style.opacity = '1';
    card.style.transform = 'translateY(0)';
  });
}

function selectOption(oi) {
  answers[currentIdx] = oi;
  renderQuestion(currentIdx);
}

function navigate(dir) {
  const next = currentIdx + dir;
  if (next >= 0 && next < questions.length) renderQuestion(next);
}

function goTo(idx) {
  renderQuestion(idx);
}

function startTimer() {
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      autoSubmit();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(secondsLeft / 60).toString().padStart(2, '0');
  const s = (secondsLeft % 60).toString().padStart(2, '0');
  const el = document.getElementById('timer-display');
  el.textContent = `${m}:${s}`;

  const pct = (secondsLeft / totalSeconds) * 100;
  document.getElementById('timer-bar').style.width = pct + '%';

  if (secondsLeft <= 60) {
    el.style.color = '#ef4444';
    document.getElementById('timer-bar').style.background = '#ef4444';
  } else if (secondsLeft <= 180) {
    el.style.color = '#f97316';
    document.getElementById('timer-bar').style.background = '#f97316';
  }
}

function confirmSubmit() {
  const unanswered = answers.filter(a => a === -1).length;
  const answered = answers.filter(a => a !== -1).length;
  document.getElementById('submit-modal-body').innerHTML = `
    <div class="submit-summary">
      <div class="summary-item answered-item"><span class="s-num">${answered}</span><span>Answered</span></div>
      <div class="summary-item unanswered-item"><span class="s-num">${unanswered}</span><span>Unanswered</span></div>
    </div>
    ${unanswered > 0 ? '<p class="warn-text">⚠️ You have ' + unanswered + ' unanswered question(s). Are you sure you want to submit?</p>' : '<p class="success-text">✅ All questions answered!</p>'}
  `;
  document.getElementById('submit-modal').classList.add('active');
}

async function autoSubmit() {
  showAlert('⏰ Time\'s up! Auto-submitting…', 'error');
  await submitQuiz();
}

async function submitQuiz() {
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('submit-modal').classList.remove('active');

  const res = await fetch(`/api/quiz/${QUIZ_ID}/submit`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({answers})
  });
  const data = await res.json();
  if (res.ok) {
    window.location.href = `/quiz/${QUIZ_ID}/result`;
  } else {
    showAlert(data.error, 'error');
  }
}

// Warn on page exit
window.addEventListener('beforeunload', e => {
  if (quizStarted && secondsLeft > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
});

startQuiz();
</script>
{% endblock %}
