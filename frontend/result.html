{% extends "base.html" %}
{% block title %}Create Quiz{% endblock %}
{% block content %}
<div class="create-quiz-page">
  <div class="page-header">
    <a href="{{ url_for('dashboard') }}" class="back-link">← Dashboard</a>
    <h1>Create New Quiz</h1>
  </div>

  <div class="create-quiz-layout">
    <div class="quiz-builder">
      <div class="form-card">
        <h2>Quiz Details</h2>
        <div class="form-group">
          <label>Quiz Title</label>
          <input type="text" id="quizTitle" placeholder="e.g. Python Fundamentals" required/>
        </div>
        <div class="form-group">
          <label>Timer (minutes)</label>
          <input type="number" id="quizTimer" value="10" min="1" max="180"/>
        </div>
      </div>

      <div id="questionsContainer"></div>

      <button class="btn-add-question" onclick="addQuestion()">+ Add Question</button>

      <div class="form-actions">
        <button class="btn-primary large-btn" onclick="saveQuiz()">Save Quiz</button>
      </div>
    </div>

    <div class="quiz-preview">
      <div class="preview-card">
        <h3>Preview</h3>
        <div id="previewTitle" class="preview-title">Quiz Title</div>
        <div id="previewCount" class="preview-count">0 questions</div>
        <div id="previewTimer" class="preview-timer">⏱ 10 min</div>
        <div id="previewList" class="preview-list"></div>
      </div>
    </div>
  </div>
</div>

<template id="questionTemplate">
  <div class="question-card" data-qid="">
    <div class="question-header">
      <span class="q-number">Q<span class="q-num-val">1</span></span>
      <button class="btn-remove-q" onclick="removeQuestion(this)">✕</button>
    </div>
    <div class="form-group">
      <label>Question</label>
      <input type="text" class="q-text" placeholder="Enter your question here"/>
    </div>
    <div class="options-list">
      <label>Answer Choices</label>
      <div class="options-container">
        <div class="option-row">
          <input type="radio" name="correct_QNUM" value="0" class="correct-radio"/>
          <input type="text" class="option-input" placeholder="Option A"/>
          <button class="btn-remove-opt" onclick="removeOption(this)">✕</button>
        </div>
        <div class="option-row">
          <input type="radio" name="correct_QNUM" value="1" class="correct-radio"/>
          <input type="text" class="option-input" placeholder="Option B"/>
          <button class="btn-remove-opt" onclick="removeOption(this)">✕</button>
        </div>
      </div>
      <button class="btn-add-opt" onclick="addOption(this)">+ Add Option</button>
    </div>
    <p class="correct-hint">☝️ Select the radio button next to the correct answer</p>
  </div>
</template>
{% endblock %}
{% block extra_js %}
<script src="{{ url_for('static', filename='js/create_quiz.js') }}"></script>
{% endblock %}
